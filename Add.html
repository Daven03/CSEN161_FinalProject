    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Share Your Recommendation</p>
        <h1>Submit a Restaurant for Review</h1>
        <p class="details">
          Tell us what makes a place worth visiting, from favorite dishes to the atmosphere students should expect.
        </p>
      </section>

      <section class="form-card">
        <div class="form-intro">
          <h2>Submission Form</h2>
          <p>Fields marked with <span class="required">*</span> are required.</p>
        </div>

        <form action="mailto:dbaloca@scu.edu?subject=Restaurant_Submission" method="POST" enctype="text/plain">
          <div class="field-grid">
            <label for="fname">First Name <span class="required">*</span></label>
            <input type="text" id="fname" name="First Name" required>

            <label for="lname">Last Name <span class="required">*</span></label>
            <input type="text" id="lname" name="Last Name" required>

            <label for="email">Your Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="Email" required>

            <label for="restaurant-name">Restaurant Name</label>
            <input type="text" id="restaurant-name" name="Restaurant Name">

            <label for="comments">Why should we feature it? <span class="required">*</span></label>
            <textarea id="comments" name="Message" rows="9" placeholder="Share the menu highlights, atmosphere, price point, and what stood out to you." required></textarea>
          </div>

          <input type="submit" id="submit" value="Send Submission">
        </form>
      </section>
    </main>
